services:
  app:
    build:
      context: .
      target: development
    volumes:
      - .:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-real_estate}
      DB_USERNAME: ${DB_USERNAME:-real_estate}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8081}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - backend

  mysql:
    image: mysql:8.4
    ports:
      - "${DB_PORT:-3308}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-real_estate}
      MYSQL_USER: ${DB_USERNAME:-real_estate}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --slow-query-log=ON
      - --long-query-time=0.5
      - --log-queries-not-using-indexes=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  scheduler:
    build:
      context: .
      target: development
    volumes:
      - .:/var/www
    depends_on:
      - app
    command: php artisan schedule:work
    environment:
      APP_ENV: local
      DB_HOST: mysql
      REDIS_HOST: redis
    networks:
      - backend

volumes:
  mysql_data:
  redis_data:

networks:
  backend:
